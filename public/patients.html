<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patients Directory - AarogyaCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.Auth && typeof Auth.protectRoute === "function") {
                Auth.protectRoute(["admin", "receptionist", "doctor"]);
            }
        });
    </script>
</head>

<body class="bg-slate-50 text-slate-800 font-sans antialiased relative">

    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Add/Edit Patient Modal -->
    <div id="patientModal"
        class="fixed inset-0 bg-slate-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm px-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 id="modalTitle" class="text-lg font-bold text-slate-800">Add New Patient</h3>
                <button type="button" onclick="closeModal()"
                    class="text-slate-400 hover:text-slate-600 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>

            <form id="patientForm" class="p-6 space-y-4">
                <input type="hidden" id="editId" />

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name *</label>
                    <input type="text" id="patientName" required class="premium-input w-full"
                        placeholder="e.g. Rohan Mehta" />
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Age *</label>
                        <input type="number" id="patientAge" required min="0" class="premium-input w-full"
                            placeholder="e.g. 34" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Gender *</label>
                        <select id="patientGender" required class="premium-input w-full">
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Contact Number *</label>
                    <input type="tel" id="patientContact" required class="premium-input w-full"
                        placeholder="e.g. 9876543210" pattern="[0-9]{10}" />
                </div>

                <div class="pt-4 flex justify-end gap-3">
                    <button type="button" onclick="closeModal()"
                        class="px-4 py-2 border border-slate-300 text-slate-700 rounded shadow-sm hover:bg-slate-50 font-medium">
                        Cancel
                    </button>
                    <button type="submit" id="submitBtn"
                        class="btn-primary min-w-[96px] flex justify-center items-center">
                        <span id="submitText">Save</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container" class="z-20"></div>

        <div class="relative flex flex-col flex-1 overflow-y-auto overflow-x-hidden ml-64">
            <div id="topbar-container" class="sticky top-0 z-10"></div>

            <main class="p-8 pb-20">
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-800">Patients Directory</h2>
                        <p class="text-slate-500">View and manage all registered patients.</p>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="text" id="searchInput" placeholder="Search by name, ID or phone..."
                            class="premium-input w-full sm:w-72 text-sm bg-white" />
                        <button id="addPatientBtn" type="button" onclick="openModal()"
                            class="btn-primary flex items-center px-4 py-2 hidden">
                            <span class="mr-2 text-lg">+</span> Add Patient
                        </button>
                    </div>
                </div>

                <div class="premium-card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="premium-table w-full">
                            <thead>
                                <tr>
                                    <th>Patient ID</th>
                                    <th>Name</th>
                                    <th>Age/Gender</th>
                                    <th>Contact</th>
                                    <th id="actionsHeader" class="hidden">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="patientsBody">
                                <tr>
                                    <td colspan="5" class="text-center py-8 text-slate-500">
                                        <svg class="animate-spin h-6 w-6 text-blue-500 mx-auto"
                                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                                stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor"
                                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                            </path>
                                        </svg>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let allPatients = [];
        let currentRole = "doctor";

        function getRole() {
            if (window.Auth && typeof Auth.getUserRole === "function") {
                return Auth.getUserRole() || "doctor";
            }
            return localStorage.getItem("hospital_role") || "doctor";
        }

        function canManagePatients() {
            return currentRole === "admin" || currentRole === "receptionist";
        }

        function getColspan() {
            return canManagePatients() ? 5 : 4;
        }

        function showToast(message, type = "success") {
            const container = document.getElementById("toastContainer");
            const color = type === "success" ? "bg-emerald-500" : "bg-red-500";

            const toast = document.createElement("div");
            toast.className = `${color} text-white px-4 py-3 rounded shadow-lg transition-all duration-300 opacity-100 translate-y-0 flex items-center text-sm font-medium`;
            toast.textContent = message;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove("opacity-100", "translate-y-0");
                toast.classList.add("opacity-0", "translate-y-2");
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 2500);
        }

        function openModal(patient = null) {
            if (!canManagePatients()) return;

            const modal = document.getElementById("patientModal");
            const form = document.getElementById("patientForm");
            const modalTitle = document.getElementById("modalTitle");
            const submitText = document.getElementById("submitText");

            form.reset();

            if (patient) {
                modalTitle.innerText = "Edit Patient";
                document.getElementById("editId").value = patient.id || "";
                document.getElementById("patientName").value = patient.name || "";
                document.getElementById("patientAge").value = patient.age || "";
                document.getElementById("patientGender").value = patient.gender || "";
                document.getElementById("patientContact").value = patient.contact || "";
                submitText.innerText = "Update";
            } else {
                modalTitle.innerText = "Add New Patient";
                document.getElementById("editId").value = "";
                submitText.innerText = "Save";
            }

            modal.classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("patientModal").classList.add("hidden");
        }

        async function fetchPatients() {
            const tbody = document.getElementById("patientsBody");

            try {
                const res = await fetch("/api/patients");
                const result = await res.json();

                if (result.success && Array.isArray(result.data)) {
                    allPatients = result.data;
                    renderPatients(allPatients);
                } else {
                    allPatients = [];
                    tbody.innerHTML = `<tr><td colspan="${getColspan()}" class="text-center py-8 text-slate-500">No patients found.</td></tr>`;
                }
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="${getColspan()}" class="text-center py-8 text-red-500">Failed to load patients.</td></tr>`;
                showToast("Failed to load patients", "error");
            }
        }

        async function savePatient(e) {
            e.preventDefault();

            const submitBtn = document.getElementById("submitBtn");
            const submitText = document.getElementById("submitText");
            const id = document.getElementById("editId").value.trim();

            const data = {
                name: document.getElementById("patientName").value.trim(),
                age: document.getElementById("patientAge").value.trim(),
                gender: document.getElementById("patientGender").value,
                contact: document.getElementById("patientContact").value.trim()
            };

            if (!data.name || !data.age || !data.gender || !data.contact) {
                showToast("Please fill all required fields", "error");
                return;
            }

            submitBtn.disabled = true;
            submitText.innerText = id ? "Updating..." : "Saving...";

            const method = id ? "PUT" : "POST";
            const url = id ? `/api/patients/${id}` : "/api/patients";

            try {
                const res = await fetch(url, {
                    method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.success) {
                    showToast(id ? "Patient updated successfully" : "Patient added successfully", "success");
                    closeModal();
                    await fetchPatients();
                } else {
                    showToast(result.message || "Error saving patient", "error");
                }
            } catch (error) {
                showToast("Network error while saving patient", "error");
            } finally {
                submitBtn.disabled = false;
                submitText.innerText = id ? "Update" : "Save";
            }
        }

        async function deletePatient(id) {
            if (!id) return;
            if (!confirm("Are you sure you want to delete this patient?")) return;

            try {
                const res = await fetch(`/api/patients/${id}`, { method: "DELETE" });
                const result = await res.json();

                if (result.success) {
                    showToast("Patient deleted successfully", "success");
                    await fetchPatients();
                } else {
                    showToast(result.message || "Error deleting patient", "error");
                }
            } catch (error) {
                showToast("Network error while deleting patient", "error");
            }
        }

        function filterPatients() {
            const term = document.getElementById("searchInput").value.toLowerCase().trim();

            const filtered = allPatients.filter((p) => {
                const name = (p.name || "").toLowerCase();
                const id = String(p.id || "").toLowerCase();
                const contact = String(p.contact || "");

                return name.includes(term) || id.includes(term) || contact.includes(term);
            });

            renderPatients(filtered);
        }

        function createActionButtons(patient) {
            if (!canManagePatients()) return "";

            const deleteBtn =
                currentRole === "admin"
                    ? `<button class="text-red-500 hover:text-red-700 font-medium text-sm" data-action="delete" data-id="${patient.id}">Delete</button>`
                    : "";

            return `
                <td>
                    <button class="text-blue-600 hover:text-blue-800 font-medium mr-3 text-sm" data-action="edit" data-id="${patient.id}">Edit</button>
                    ${deleteBtn}
                </td>
            `;
        }

        function renderPatients(patients) {
            const tbody = document.getElementById("patientsBody");

            if (!patients || patients.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="${getColspan()}" class="text-center py-8 text-slate-500">
                            No patients found.
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = patients
                .map(
                    (p) => `
                    <tr>
                        <td class="font-medium text-slate-500">#${p.id || "-"}</td>
                        <td class="font-bold text-slate-800">${p.name || "-"}</td>
                        <td>${p.age || "-"} yrs, ${p.gender || "-"}</td>
                        <td>${p.contact || "-"}</td>
                        ${createActionButtons(p)}
                    </tr>
                `
                )
                .join("");

            attachActionEvents();
        }

        function attachActionEvents() {
            document.querySelectorAll('[data-action="edit"]').forEach((btn) => {
                btn.addEventListener("click", () => {
                    const id = btn.getAttribute("data-id");
                    const patient = allPatients.find((p) => String(p.id) === String(id));
                    if (patient) openModal(patient);
                });
            });

            document.querySelectorAll('[data-action="delete"]').forEach((btn) => {
                btn.addEventListener("click", () => {
                    const id = btn.getAttribute("data-id");
                    deletePatient(id);
                });
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            currentRole = getRole();

            const addPatientBtn = document.getElementById("addPatientBtn");
            const actionsHeader = document.getElementById("actionsHeader");
            const searchInput = document.getElementById("searchInput");
            const patientForm = document.getElementById("patientForm");
            const modal = document.getElementById("patientModal");

            if (canManagePatients()) {
                addPatientBtn.classList.remove("hidden");
                actionsHeader.classList.remove("hidden");
            }

            patientForm.addEventListener("submit", savePatient);
            searchInput.addEventListener("input", filterPatients);

            modal.addEventListener("click", (e) => {
                if (e.target.id === "patientModal") {
                    closeModal();
                }
            });

            fetchPatients();
        });
    </script>
</body>

</html>
