<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctors Directory - AarogyaCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.Auth && typeof Auth.protectRoute === "function") {
                Auth.protectRoute(["admin"]);
            }
        });
    </script>
</head>

<body class="bg-slate-50 text-slate-800 font-sans antialiased relative">
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Add/Edit Doctor Modal -->
    <div id="doctorModal"
        class="fixed inset-0 bg-slate-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm px-4">
        <div
            class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all max-h-[90vh] flex flex-col">
            <div
                class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 relative shrink-0">
                <h3 id="modalTitle" class="text-lg font-bold text-slate-800">Onboard New Doctor</h3>
                <button type="button" onclick="closeModal()"
                    class="text-slate-400 hover:text-slate-600 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>

            <div class="overflow-y-auto p-6">
                <form id="doctorForm" class="space-y-4">
                    <input type="hidden" id="editId" />

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Full Name *</label>
                        <input type="text" id="docName" required class="premium-input w-full"
                            placeholder="e.g. Dr. Priya Nair" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Specialty / Department *</label>
                        <select id="docSpecialty" required class="premium-input w-full">
                            <option value="">Select department</option>
                            <option value="General Medicine">General Medicine</option>
                            <option value="Cardiology">Cardiology</option>
                            <option value="Pediatrics">Pediatrics</option>
                            <option value="Orthopedics">Orthopedics</option>
                            <option value="Dermatology">Dermatology</option>
                            <option value="Neurology">Neurology</option>
                            <option value="Gynaecology">Gynaecology</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Experience (Years) *</label>
                            <input type="number" id="docExp" required min="1" class="premium-input w-full"
                                placeholder="e.g. 10" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Contact Number *</label>
                            <input type="tel" id="docPhone" required class="premium-input w-full"
                                placeholder="e.g. 9876500000" pattern="[0-9]{10}" />
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                        <input type="email" id="docEmail" class="premium-input w-full"
                            placeholder="e.g. priya@aarogyacare.in" />
                    </div>

                    <div class="flex items-center pt-2">
                        <input type="checkbox" id="docAvailable"
                            class="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500" checked />
                        <label for="docAvailable" class="ml-2 block text-sm font-medium text-slate-700">
                            Available for Appointments
                        </label>
                    </div>
                </form>
            </div>

            <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3 shrink-0 bg-slate-50">
                <button type="button" onclick="closeModal()"
                    class="px-4 py-2 border border-slate-300 text-slate-700 rounded shadow-sm hover:bg-slate-50 font-medium">
                    Cancel
                </button>
                <button type="button" id="saveDoctorBtn" onclick="saveDoctor()"
                    class="btn-primary w-24 flex justify-center items-center">
                    <span id="submitText">Save</span>
                </button>
            </div>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container" class="z-20"></div>

        <div class="relative flex flex-col flex-1 overflow-y-auto overflow-x-hidden ml-64">
            <div id="topbar-container" class="sticky top-0 z-10"></div>

            <main class="p-8 pb-20">
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-800">Doctors Management</h2>
                        <p class="text-slate-500">View and manage clinical staff.</p>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="text" id="searchInput" placeholder="Search by name, ID or specialty..."
                            class="premium-input w-full sm:w-72 text-sm bg-white" />
                        <button type="button" onclick="openModal()" class="btn-primary flex items-center px-4 py-2">
                            <span class="mr-2 text-lg">+</span> Onboard Doctor
                        </button>
                    </div>
                </div>

                <div class="premium-card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="premium-table w-full">
                            <thead>
                                <tr>
                                    <th>Doctor ID</th>
                                    <th>Name</th>
                                    <th>Specialty</th>
                                    <th>Contact Info</th>
                                    <th>Experience</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="doctorsBody">
                                <tr>
                                    <td colspan="7" class="text-center py-8 text-slate-500">
                                        <svg class="animate-spin h-6 w-6 text-blue-500 mx-auto"
                                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                                stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor"
                                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                            </path>
                                        </svg>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let allDoctors = [];

        function showToast(message, type = "success") {
            const container = document.getElementById("toastContainer");
            const color = type === "success" ? "bg-emerald-500" : "bg-red-500";

            const toast = document.createElement("div");
            toast.className = `${color} text-white px-4 py-3 rounded shadow-lg transition-all duration-300 opacity-100 translate-y-0 flex items-center text-sm font-medium`;
            toast.textContent = message;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove("opacity-100", "translate-y-0");
                toast.classList.add("opacity-0", "translate-y-2");
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function getDoctorInitial(name = "") {
            const clean = String(name).replace(/^Dr\.?\s*/i, "").trim();
            return clean ? clean.charAt(0).toUpperCase() : "D";
        }

        function openModal(doc = null) {
            const modal = document.getElementById("doctorModal");
            const form = document.getElementById("doctorForm");
            const btnText = document.getElementById("submitText");

            form.reset();

            if (doc) {
                document.getElementById("modalTitle").innerText = "Edit Doctor Profile";
                document.getElementById("editId").value = doc.id || "";
                document.getElementById("docName").value = doc.name || "";
                document.getElementById("docSpecialty").value = doc.specialty || "";
                document.getElementById("docExp").value = doc.experience || "";
                document.getElementById("docPhone").value = doc.phone || "";
                document.getElementById("docEmail").value = doc.email || "";
                document.getElementById("docAvailable").checked = doc.available !== false;
                btnText.innerText = "Update";
            } else {
                document.getElementById("modalTitle").innerText = "Onboard New Doctor";
                document.getElementById("editId").value = "";
                document.getElementById("docAvailable").checked = true;
                btnText.innerText = "Save";
            }

            modal.classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("doctorModal").classList.add("hidden");
        }

        async function fetchDoctors() {
            const tbody = document.getElementById("doctorsBody");

            try {
                const res = await fetch("/api/doctors");
                const result = await res.json();

                if (result.success && Array.isArray(result.data)) {
                    allDoctors = result.data;
                    renderDoctors(allDoctors);
                } else {
                    allDoctors = [];
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" class="text-center py-8 text-slate-500">No doctors found.</td>
                        </tr>
                    `;
                }
            } catch (error) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-8 text-red-500">Failed to load doctors.</td>
                    </tr>
                `;
                showToast("Failed to load doctors", "error");
            }
        }

        async function saveDoctor() {
            const form = document.getElementById("doctorForm");
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const saveBtn = document.getElementById("saveDoctorBtn");
            const submitText = document.getElementById("submitText");
            const id = document.getElementById("editId").value.trim();

            const data = {
                name: document.getElementById("docName").value.trim(),
                specialty: document.getElementById("docSpecialty").value,
                experience: parseInt(document.getElementById("docExp").value, 10),
                phone: document.getElementById("docPhone").value.trim(),
                email: document.getElementById("docEmail").value.trim(),
                available: document.getElementById("docAvailable").checked
            };

            saveBtn.disabled = true;
            submitText.innerText = id ? "Updating..." : "Saving...";

            const method = id ? "PUT" : "POST";
            const url = id ? `/api/doctors/${id}` : "/api/doctors";

            try {
                const res = await fetch(url, {
                    method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.success) {
                    showToast(id ? "Doctor updated successfully" : "Doctor onboarded successfully", "success");
                    closeModal();
                    await fetchDoctors();
                } else {
                    showToast(result.message || "Error saving doctor", "error");
                }
            } catch (error) {
                showToast("Network error while saving doctor", "error");
            } finally {
                saveBtn.disabled = false;
                submitText.innerText = id ? "Update" : "Save";
            }
        }

        async function deleteDoctor(id) {
            if (!id) return;
            if (!confirm("Are you certain you want to remove this doctor from the system?")) return;

            try {
                const res = await fetch(`/api/doctors/${id}`, { method: "DELETE" });
                const result = await res.json();

                if (result.success) {
                    showToast("Doctor deleted successfully", "success");
                    await fetchDoctors();
                } else {
                    showToast(result.message || "Error deleting doctor", "error");
                }
            } catch (error) {
                showToast("Network error while deleting doctor", "error");
            }
        }

        function filterDoctors() {
            const term = document.getElementById("searchInput").value.toLowerCase().trim();

            const filtered = allDoctors.filter((d) => {
                const name = String(d.name || "").toLowerCase();
                const id = String(d.id || "").toLowerCase();
                const specialty = String(d.specialty || "").toLowerCase();
                const phone = String(d.phone || "");
                return (
                    name.includes(term) ||
                    id.includes(term) ||
                    specialty.includes(term) ||
                    phone.includes(term)
                );
            });

            renderDoctors(filtered);
        }

        function renderDoctors(doctors) {
            const tbody = document.getElementById("doctorsBody");

            if (!doctors || doctors.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-8 text-slate-500">No doctors found.</td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = doctors.map((d) => `
                <tr>
                    <td class="font-medium text-slate-500">#${d.id || "-"}</td>
                    <td class="font-bold text-slate-800">
                        <div class="flex items-center">
                            <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold mr-3 text-xs border border-indigo-200">
                                ${getDoctorInitial(d.name)}
                            </div>
                            ${d.name || "-"}
                        </div>
                    </td>
                    <td>
                        <span class="text-indigo-600 font-medium bg-indigo-50 px-2 py-1 rounded text-xs border border-indigo-100">
                            ${d.specialty || "-"}
                        </span>
                    </td>
                    <td>
                        <div class="text-xs text-slate-600">${d.phone || "N/A"}</div>
                        <div class="text-xs text-slate-400">${d.email || "N/A"}</div>
                    </td>
                    <td>${d.experience || 0} Yrs</td>
                    <td>
                        <span class="${d.available ? 'badge-success' : 'text-xs text-slate-600 font-medium bg-slate-100 px-2 py-1 rounded inline-block'}">
                            ${d.available ? 'Active' : 'Unavailable'}
                        </span>
                    </td>
                    <td>
                        <button class="text-blue-600 hover:text-blue-800 font-medium mr-3 text-sm" data-action="edit" data-id="${d.id}">Edit</button>
                        <button class="text-red-500 hover:text-red-700 font-medium text-sm" data-action="delete" data-id="${d.id}">Delete</button>
                    </td>
                </tr>
            `).join("");

            attachDoctorActionEvents();
        }

        function attachDoctorActionEvents() {
            document.querySelectorAll('[data-action="edit"]').forEach((btn) => {
                btn.addEventListener("click", () => {
                    const id = btn.getAttribute("data-id");
                    const doctor = allDoctors.find((d) => String(d.id) === String(id));
                    if (doctor) openModal(doctor);
                });
            });

            document.querySelectorAll('[data-action="delete"]').forEach((btn) => {
                btn.addEventListener("click", () => {
                    const id = btn.getAttribute("data-id");
                    deleteDoctor(id);
                });
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("searchInput").addEventListener("input", filterDoctors);

            document.getElementById("doctorModal").addEventListener("click", (e) => {
                if (e.target.id === "doctorModal") {
                    closeModal();
                }
            });

            fetchDoctors();
        });
    </script>
</body>

</html>
