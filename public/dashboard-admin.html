<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AarogyaCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/layout.js"></script>
    <script>
        Auth.protectRoute(['admin']);
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
    
    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container" class="z-20"></div>

        <div class="relative flex flex-col flex-1 overflow-y-auto overflow-x-hidden ml-64">
            <div id="topbar-container" class="sticky top-0 z-10"></div>

            <main class="p-8 pb-20">
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-slate-800">Hospital Overview</h2>
                    <p class="text-slate-500">Welcome back! Here's the live data summary for AarogyaCare today.</p>
                </div>

                <!-- Stats grid -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="premium-card p-6 border-l-4 border-blue-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-medium text-slate-500 mb-1">Total Patients</p>
                                <p class="text-3xl font-bold text-slate-800" id="kpiPatients">0</p>
                            </div>
                            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                            </div>
                        </div>
                    </div>
                    
                    <div class="premium-card p-6 border-l-4 border-emerald-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-medium text-slate-500 mb-1">Today's Appointments</p>
                                <p class="text-3xl font-bold text-slate-800" id="kpiApptsToday">0</p>
                            </div>
                            <div class="w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            </div>
                        </div>
                    </div>

                    <div class="premium-card p-6 border-l-4 border-purple-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-medium text-slate-500 mb-1">Active Doctors</p>
                                <p class="text-3xl font-bold text-slate-800" id="kpiDoctors">0</p>
                            </div>
                            <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center text-purple-600">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            </div>
                        </div>
                    </div>

                    <div class="premium-card p-6 border-l-4 border-amber-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-medium text-slate-500 mb-1">Completed Appts</p>
                                <p class="text-3xl font-bold text-slate-800" id="kpiCompleted">0</p>
                            </div>
                            <div class="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center text-amber-600">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                    <div class="premium-card p-6">
                        <h3 class="font-bold text-slate-800 mb-6">Appointment Status Distribution</h3>
                        <div class="relative h-64 w-full flex justify-center">
                            <canvas id="statusChart"></canvas>
                        </div>
                    </div>
                    <div class="premium-card p-6">
                        <h3 class="font-bold text-slate-800 mb-6">Doctors by Department</h3>
                        <div class="relative h-64 w-full">
                            <canvas id="deptChart"></canvas>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script>
        async function fetchDashboardData() {
            try {
                const [pRes, dRes, aRes] = await Promise.all([
                    fetch('/api/patients'),
                    fetch('/api/doctors'),
                    fetch('/api/appointments')
                ]);
                const patients = (await pRes.json()).data;
                const doctors = (await dRes.json()).data;
                const appts = (await aRes.json()).data;

                // Build KPIs
                document.getElementById('kpiPatients').innerText = patients.length;
                document.getElementById('kpiDoctors').innerText = doctors.filter(d => d.available).length;
                
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('kpiApptsToday').innerText = appts.filter(a => a.date === today && a.status !== 'Cancelled').length;
                document.getElementById('kpiCompleted').innerText = appts.filter(a => a.status === 'Completed').length;

                // Build Status Chart
                const statusCounts = appts.reduce((acc, a) => {
                    acc[a.status] = (acc[a.status] || 0) + 1;
                    return acc;
                }, {});

                new Chart(document.getElementById('statusChart'), {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(statusCounts),
                        datasets: [{
                            data: Object.values(statusCounts),
                            backgroundColor: ['#eab308', '#22c55e', '#ef4444', '#3b82f6'],
                            borderWidth: 0
                        }]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
                });

                // Build Department Chart
                const deptCounts = doctors.reduce((acc, d) => {
                    acc[d.specialty] = (acc[d.specialty] || 0) + 1;
                    return acc;
                }, {});

                new Chart(document.getElementById('deptChart'), {
                    type: 'bar',
                    data: {
                        labels: Object.keys(deptCounts),
                        datasets: [{
                            label: 'Number of Doctors',
                            data: Object.values(deptCounts),
                            backgroundColor: '#6366f1',
                            borderRadius: 4
                        }]
                    },
                    options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
                });

            } catch(e) {
                console.error("Dashboard failed to load analytics", e);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchDashboardData);
    </script>
</body>
</html>
