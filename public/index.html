<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AarogyaCare Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            try {
                if (window.Auth && Auth.isLoggedIn()) {
                    Auth.redirectToDashboard();
                }
            } catch (e) {
                localStorage.clear();
                sessionStorage.clear();
            }
        });
    </script>

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
        <!-- Left Banner Side -->
        <div class="md:w-5/12 bg-blue-900 p-10 flex flex-col justify-between text-white relative overflow-hidden">
            <div class="absolute -right-16 -top-16 w-64 h-64 bg-blue-800 rounded-full opacity-50 blur-3xl"></div>
            <div class="absolute -left-16 -bottom-16 w-64 h-64 bg-blue-700 rounded-full opacity-50 blur-3xl"></div>

            <div class="relative z-10">
                <div class="flex items-center mb-8">
                    <svg class="w-10 h-10 text-blue-300 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z">
                        </path>
                    </svg>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight">AarogyaCare</h1>
                        <p class="text-xs text-blue-200 uppercase tracking-widest">Hospital</p>
                    </div>
                </div>

                <h2 class="text-3xl font-bold mb-4 leading-tight">Smart Patient Management for Better Care</h2>
                <p class="text-blue-200">Delivering premium healthcare services in Bengaluru, India.</p>
            </div>

            <div class="relative z-10 mt-12 text-sm text-blue-300">
                &copy; 2026 AarogyaCare Pvt Ltd.
            </div>
        </div>

        <!-- Right Form Side -->
        <div class="md:w-7/12 p-10 md:p-14">
            <h3 class="text-2xl font-bold text-slate-800 mb-2">Welcome Back</h3>
            <p class="text-slate-500 mb-8">Please sign in to access your secure dashboard.</p>

            <form id="loginForm" class="space-y-6" novalidate>
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Staff ID /
                        Username</label>
                    <input type="text" id="username" class="premium-input" placeholder="e.g. admin, doctor, reception"
                        required />
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                        <span class="text-sm text-slate-400 font-medium select-none">Demo mode</span>
                    </div>
                    <input type="password" id="password" class="premium-input" placeholder="••••••••" required />
                </div>

                <div id="errorMsg" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded-lg border border-red-100">
                </div>

                <button type="submit" id="loginBtn" class="w-full btn-primary py-3 text-lg mt-4">
                    <span id="loginBtnText">Sign In Securely</span>
                </button>
            </form>

            <div class="mt-10 p-4 bg-slate-50 border border-slate-200 rounded-lg">
                <h4 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">
                    Demo Credentials (password: password123)
                </h4>
                <div class="flex flex-wrap gap-2 text-sm">
                    <button type="button"
                        class="px-3 py-1 bg-white border border-slate-300 rounded shadow-sm hover:bg-slate-50"
                        onclick="fillDemo('admin')">Admin</button>
                    <button type="button"
                        class="px-3 py-1 bg-white border border-slate-300 rounded shadow-sm hover:bg-slate-50"
                        onclick="fillDemo('doctor')">Doctor</button>
                    <button type="button"
                        class="px-3 py-1 bg-white border border-slate-300 rounded shadow-sm hover:bg-slate-50"
                        onclick="fillDemo('reception')">Receptionist</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function fillDemo(user) {
            document.getElementById("username").value = user;
            document.getElementById("password").value = "password123";
            document.getElementById("errorMsg").classList.add("hidden");
            document.getElementById("errorMsg").textContent = "";
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const errDiv = document.getElementById("errorMsg");
            const loginBtn = document.getElementById("loginBtn");
            const loginBtnText = document.getElementById("loginBtnText");

            errDiv.classList.add("hidden");
            errDiv.textContent = "";

            if (!username || !password) {
                errDiv.textContent = "Please enter username and password.";
                errDiv.classList.remove("hidden");
                return;
            }

            loginBtn.disabled = true;
            loginBtnText.textContent = "Signing In...";

            try {
                const result = await Auth.login(username, password);

                if (result && result.success) {
                    Auth.redirectToDashboard();
                } else {
                    errDiv.textContent = "Login failed. Please try again.";
                    errDiv.classList.remove("hidden");
                }
            } catch (error) {
                errDiv.textContent = error?.message || "Unable to sign in. Please try again.";
                errDiv.classList.remove("hidden");
            } finally {
                loginBtn.disabled = false;
                loginBtnText.textContent = "Sign In Securely";
            }
        });
    </script>
</body>

</html>
