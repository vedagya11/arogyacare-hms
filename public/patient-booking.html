<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - AarogyaCare Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
        <!-- Left Banner Side -->
        <div class="md:w-5/12 bg-blue-900 p-10 flex flex-col justify-between text-white relative overflow-hidden">
            <div class="absolute -right-16 -top-16 w-64 h-64 bg-blue-800 rounded-full opacity-50 blur-3xl"></div>
            <div class="absolute -left-16 -bottom-16 w-64 h-64 bg-blue-700 rounded-full opacity-50 blur-3xl"></div>

            <div class="relative z-10">
                <div class="flex items-center mb-8">
                    <svg class="w-10 h-10 text-blue-300 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z">
                        </path>
                    </svg>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight">AarogyaCare</h1>
                        <p class="text-xs text-blue-200 uppercase tracking-widest">Hospital</p>
                    </div>
                </div>

                <h2 class="text-3xl font-bold mb-4 leading-tight">Book Your Appointment Instantly</h2>
                <p class="text-blue-200">Our expert doctors are ready to assist you. Skip the queue by scheduling online.</p>
            </div>

            <div class="relative z-10 mt-12 text-sm text-blue-300">
                <a href="/" class="hover:text-white transition-colors duration-200 flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to Staff Login
                </a>
                <div class="mt-4">&copy; 2026 AarogyaCare Pvt Ltd.</div>
            </div>
        </div>

        <!-- Right Form Side -->
        <div class="md:w-7/12 p-10 md:p-14 overflow-y-auto max-h-[90vh] md:max-h-none">
            <h3 class="text-2xl font-bold text-slate-800 mb-2">Patient Details</h3>
            <p class="text-slate-500 mb-8">Fill out the form below to secure your consultation.</p>

            <form id="bookingForm" class="space-y-5" novalidate>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label for="patientName" class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                        <input type="text" id="patientName" class="premium-input" placeholder="e.g. Rahul Sharma" required />
                    </div>
                    <div>
                        <label for="phone" class="block text-sm font-medium text-slate-700 mb-1">Phone Number</label>
                        <input type="tel" id="phone" class="premium-input" placeholder="10-digit number" required />
                    </div>
                    <div>
                        <label for="age" class="block text-sm font-medium text-slate-700 mb-1">Age</label>
                        <input type="number" id="age" min="0" class="premium-input" placeholder="e.g. 30" required />
                    </div>
                    <div>
                        <label for="gender" class="block text-sm font-medium text-slate-700 mb-1">Gender</label>
                        <select id="gender" class="premium-input" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <hr class="border-slate-100 my-4" />

                <div class="space-y-5">
                    <div>
                        <label for="doctorId" class="block text-sm font-medium text-slate-700 mb-1">Select Doctor</label>
                        <select id="doctorId" class="premium-input" required>
                            <option value="">Loading available doctors...</option>
                        </select>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label for="date" class="block text-sm font-medium text-slate-700 mb-1">Date</label>
                            <input type="date" id="date" class="premium-input" required />
                        </div>
                        <div>
                            <label for="time" class="block text-sm font-medium text-slate-700 mb-1">Time</label>
                            <select id="time" class="premium-input" required>
                                <option value="">Select Time Slot</option>
                                <option value="09:00 AM">09:00 AM</option>
                                <option value="09:30 AM">09:30 AM</option>
                                <option value="10:00 AM">10:00 AM</option>
                                <option value="10:30 AM">10:30 AM</option>
                                <option value="11:00 AM">11:00 AM</option>
                                <option value="11:30 AM">11:30 AM</option>
                                <option value="12:00 PM">12:00 PM</option>
                                <option value="02:00 PM">02:00 PM</option>
                                <option value="02:30 PM">02:30 PM</option>
                                <option value="03:00 PM">03:00 PM</option>
                                <option value="03:30 PM">03:30 PM</option>
                                <option value="04:00 PM">04:00 PM</option>
                                <option value="04:30 PM">04:30 PM</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label for="reason" class="block text-sm font-medium text-slate-700 mb-1">Reason for Visit (Optional)</label>
                        <textarea id="reason" class="premium-input" placeholder="Brief description of your symptoms..." rows="2"></textarea>
                    </div>
                </div>

                <div id="statusMsg" class="hidden text-sm p-4 rounded-lg border mb-4"></div>

                <button type="submit" id="bookBtn" class="w-full btn-primary py-3 text-lg mt-6 shadow-md hover:shadow-lg transition-all duration-200">
                    <span id="bookBtnText">Confirm Appointment</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Set minimum date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').min = today;

            try {
                const response = await fetch('/api/public/doctors');
                const result = await response.json();
                
                const doctorSelect = document.getElementById('doctorId');
                doctorSelect.innerHTML = '<option value="">Select Doctor</option>';

                if (result.success && result.data) {
                    result.data.forEach(doc => {
                        const option = document.createElement('option');
                        option.value = doc.id;
                        option.textContent = `${doc.name} - ${doc.specialty}`;
                        doctorSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error("Failed to load doctors:", error);
                document.getElementById('doctorId').innerHTML = '<option value="">Error loading doctors</option>';
            }
        });

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('bookBtn');
            const btnText = document.getElementById('bookBtnText');
            const statusMsg = document.getElementById('statusMsg');
            
            statusMsg.classList.add('hidden');
            // reset classes
            statusMsg.className = "hidden text-sm p-4 rounded-lg border mb-4 mt-4";
            
            const patientName = document.getElementById('patientName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const doctorId = document.getElementById('doctorId').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const reason = document.getElementById('reason').value.trim();

            if (!patientName || !phone || !age || !gender || !doctorId || !date || !time) {
                statusMsg.textContent = "Please fill in all required fields.";
                statusMsg.classList.add("bg-red-50", "text-red-600", "border-red-100");
                statusMsg.classList.remove("hidden");
                return;
            }

            btn.disabled = true;
            btnText.textContent = "Booking...";

            try {
                const response = await fetch('/api/public/book-appointment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ patientName, phone, age, gender, doctorId, date, time, reason })
                });

                const result = await response.json();

                if (result.success) {
                    statusMsg.textContent = "✅ " + result.message;
                    statusMsg.classList.add("bg-green-50", "text-green-700", "border-green-200");
                    statusMsg.classList.remove("hidden");
                    e.target.reset();
                } else {
                    statusMsg.textContent = "❌ " + (result.message || "Booking failed.");
                    statusMsg.classList.add("bg-red-50", "text-red-600", "border-red-100");
                    statusMsg.classList.remove("hidden");
                }
            } catch (error) {
                statusMsg.textContent = "❌ Network error. Please try again later.";
                statusMsg.classList.add("bg-red-50", "text-red-600", "border-red-100");
                statusMsg.classList.remove("hidden");
            } finally {
                btn.disabled = false;
                btnText.textContent = "Confirm Appointment";
            }
        });
    </script>
</body>
</html>
